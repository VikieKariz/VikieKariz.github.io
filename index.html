<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editable Website Text with PayPal Link</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<p class="editable">Click to edit this text.</p>
<p class="editable">This is another editable text.</p>
<p class="editable">You can click here to edit as well.</p>
<button id="saveBtn">Save Changes</button>

<!-- Button to open the modal -->
<button id="openModalBtn">Open Pop-Up</button>

<!-- The Modal -->
<div id="myModal" class="modal">
  <!-- Modal content -->
  <div class="modal-content">
    <span class="close">&times;</span>
    <p>Click the button below to go to PayPal:</p>
    <button onclick="window.location.href='https://www.paypal.com';">Go to PayPal</button>
  </div>
</div>

<!-- WhatsApp Share Button -->
<button id="whatsappBtn">Share on WhatsApp</button>

<script src="script.js"></script>
</body>
      </html>

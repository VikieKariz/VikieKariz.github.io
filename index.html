<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editable Website Text with PayPal Link</title>
    <style>
        .editable {
            cursor: pointer;
            display: inline-block;
            padding: 5px;
            border: 1px dashed #ccc;
        }
        #saveBtn {
            display: none;
            margin-top: 10px;
            padding: 5px 10px;
            background-color: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
        }
        .modal {
            display: none;
            position: fixed;
            z-index: 1;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            overflow: auto;
            background-color: rgb(0,0,0);
            background-color: rgba(0,0,0,0.4);
            padding-top: 60px;
        }
        .modal-content {
            background-color: #fefefe;
            margin: 5% auto;
            padding: 20px;
            border: 1px solid #888;
            width: 80%;
        }
        .close {
            color: #aaa;
            float: right;
            font-size: 28px;
            font-weight: bold;
        }
        .close:hover,
        .close:focus {
            color: black;
            text-decoration: none;
            cursor: pointer;
        }
        #openModalBtn {
            margin-top: 10px;
            padding: 5px 10px;
            background-color: #008CBA;
            color: white;
            border: none;
            cursor: pointer;
        }
        #whatsappBtn {
            display: none; /* Hidden by default */
            margin-top: 10px;
            padding: 5px 10px;
            background-color: #25D366;
            color: white;
            border: none;
            cursor: pointer;
        }
    </style>
</head>
<body>

<p class="editable">Click to edit this text.</p>
<p class="editable">This is another editable text.</p>
<p class="editable">You can click here to edit as well.</p>
<button id="saveBtn">Save Changes</button>

<!-- Button to open the modal -->
<button id="openModalBtn">Open Pop-Up</button>

<!-- The Modal -->
<div id="myModal" class="modal">
  <!-- Modal content -->
  <div class="modal-content">
    <span class="close">&times;</span>
    <p>Click the button below to go to PayPal:</p>
    <button onclick="window.location.href='https://www.paypal.com';">Go to PayPal</button>
  </div>
</div>

<!-- WhatsApp Share Button -->
<button id="whatsappBtn">Share on WhatsApp</button>

<script>
// Function to make elements editable
function makeEditable(element) {
    element.contentEditable = true;
    element.focus();
    document.getElementById("saveBtn").style.display = "inline-block";
}

// Function to save changes
function saveChanges() {
    var editableElements = document.getElementsByClassName("editable");
    for (var i = 0; i < editableElements.length; i++) {
        var element = editableElements[i];
        localStorage.setItem('editable-' + i, element.innerHTML);
        element.contentEditable = false;
    }
    document.getElementById("saveBtn").style.display = "none";
}

// Load stored content from localStorage
function loadContent() {
    var editableElements = document.getElementsByClassName("editable");
    for (var i = 0; i < editableElements.length; i++) {
        var storedContent = localStorage.getItem('editable-' + i);
        if (storedContent) {
            editableElements[i].innerHTML = storedContent;
        }
    }
}

// Make elements editable on click
document.addEventListener("DOMContentLoaded", function() {
    var editableElements = document.getElementsByClassName("editable");
    for (var i = 0; i < editableElements.length; i++) {
        editableElements[i].onclick = function() {
            makeEditable(this);
        };
    }
});

// Save changes on save button click
document.getElementById("saveBtn").onclick = function() {
    saveChanges();
};

// Load content on page load
window.onload = function() {
    loadContent();
};

// Get the modal
var modal = document.getElementById("myModal");

// Get the button that opens the modal
var btn = document.getElementById("openModalBtn");

// Get the <span> element that closes the modal
var span = document.getElementsByClassName("close")[0];

// When the user clicks the button, open the modal 
btn.onclick = function() {
  modal.style.display = "block";
}

// When the user clicks on <span> (x), close the modal
span.onclick = function() {
  modal.style.display = "none";
}

// When the user clicks anywhere outside of the modal, close it
window.onclick = function(event) {
  if (event.target == modal) {
    modal.style.display = "none";
  }
}

// Check the referrer and display WhatsApp button if redirected from PayPal
document.addEventListener("DOMContentLoaded", function() {
  var whatsappBtn = document.getElementById("whatsappBtn");
  if (document.referrer.includes("paypal.com")) {
    whatsappBtn.style.display = "inline-block";
  }
});

// Add event listener to WhatsApp button to share the link
document.getElementById("whatsappBtn").addEventListener("click", function() {
  var url = window.location.href;
  window.location.href = "https://api.whatsapp.com/send?text=" + encodeURIComponent("Check out this site: " + url);
});
</script>

</body>
    </html>

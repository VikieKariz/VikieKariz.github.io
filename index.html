<!<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editable Website Text</title>
    <style>
        .editable {
            cursor: pointer;
            display: inline-block;
            padding: 5px;
            border: 1px dashed #ccc;
        }
        #saveBtn {
            display: none;
            margin-top: 10px;
            padding: 5px 10px;
            background-color: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
        }
    </style>
</head>
<body>

<p class="editable">Click to edit this text.</p>
<p class="editable">This is another editable text.</p>
<p class="editable">You can click here to edit as well.</p>
<button id="saveBtn">Save Changes</button>

<script>
// Function to make elements editable
function makeEditable(element) {
    element.contentEditable = true;
    element.focus();
    document.getElementById("saveBtn").style.display = "inline-block";
}

// Function to save changes
function saveChanges() {
    var editableElements = document.getElementsByClassName("editable");
    for (var i = 0; i < editableElements.length; i++) {
        var element = editableElements[i];
        localStorage.setItem('editable-' + i, element.innerHTML);
        element.contentEditable = false;
    }
    document.getElementById("saveBtn").style.display = "none";
}

// Load stored content from localStorage
function loadContent() {
    var editableElements = document.getElementsByClassName("editable");
    for (var i = 0; i < editableElements.length; i++) {
        var storedContent = localStorage.getItem('editable-' + i);
        if (storedContent) {
            editableElements[i].innerHTML = storedContent;
        }
    }
}

// Make elements editable on click
document.addEventListener("DOMContentLoaded", function() {
    var editableElements = document.getElementsByClassName("editable");
    for (var i = 0; i < editableElements.length; i++) {
        editableElements[i].onclick = function() {
            makeEditable(this);
        };
    }
});

// Save changes on save button click
document.getElementById("saveBtn").onclick = function() {
    saveChanges();
};

// Load content on page load
window.onload = function() {
    loadContent();
};
</script>

</body>
